name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.22'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test server
        run: cd server && make test
      - name: Test CLI
        run: cd cli && make test

  build-server:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: gcc
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: gcc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install ARM64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build server
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o ../dist/cloudguard-${GOOS}-${GOARCH} ./cmd/cloudguard
      - uses: actions/upload-artifact@v4
        with:
          name: cloudguard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cloudguard-*

  build-cli:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build CLI
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o ../dist/cloudguard-cli-${GOOS}-${GOARCH} ./cmd/cloudguard-cli
      - uses: actions/upload-artifact@v4
        with:
          name: cloudguard-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cloudguard-cli-*

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  release:
    needs: [build-server, build-cli, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum cloudguard-* > checksums.txt
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> notes.md
          else
            echo "## Initial Release" > notes.md
            echo "" >> notes.md
            git log --pretty=format:"- %s (%h)" >> notes.md
          fi
          echo "" >> notes.md
          echo "" >> notes.md
          echo "## Docker" >> notes.md
          echo '```bash' >> notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "## Checksums (SHA-256)" >> notes.md
          echo '```' >> notes.md
          cat artifacts/checksums.txt >> notes.md
          echo '```' >> notes.md
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            artifacts/cloudguard-*
            artifacts/checksums.txt
